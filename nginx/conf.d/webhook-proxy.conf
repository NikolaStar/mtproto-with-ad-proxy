# Webhook proxy: /webhook-proxy/<host>/<path>?<query>  →  https://<host>/<path>?<query>
#
# Пример:
#   https://domain.com/webhook-proxy/bot.clubsyndicate.ru/bot/handler.php?a=1
#   →  https://bot.clubsyndicate.ru/bot/handler.php?a=1

server {
    listen 80;
    server_name ${WEBHOOK_PROXY_DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ${WEBHOOK_PROXY_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${WEBHOOK_PROXY_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${WEBHOOK_PROXY_DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Резолвер нужен при динамическом proxy_pass через переменную
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Перехватываем /webhook-proxy/<host><path>
    location ~ ^/webhook-proxy/([^/]+)(/.*)?$ {
        set $target_host $1;
        set $target_path $2;

        include          /etc/nginx/snippets/proxy-common.conf;
        proxy_pass       https://$target_host$target_path$is_args$args;
        proxy_set_header Host $target_host;
    }

    # Всё остальное — 404
    location / {
        return 404;
    }
}
