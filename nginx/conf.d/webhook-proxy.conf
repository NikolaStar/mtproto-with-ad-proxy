# Webhook forwarder
#
# Telegram шлёт POST на:
#   https://yourdomain.com/webhook-proxy/bot.clubsyndicate.ru/bot/handler.php?a=1
#
# Nginx читает цель прямо из URL и проксирует в:
#   https://bot.clubsyndicate.ru/bot/handler.php?a=1

server {
    listen 80;
    server_name _;   # любой домен, направленный на этот сервер

    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    location ~ ^/webhook-proxy/([^/]+)(/.*)?$ {
        set $target_host $1;
        set $target_path $2;

        proxy_pass       https://$target_host$target_path$is_args$args;
        proxy_set_header Host              $target_host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_http_version  1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_ssl_server_name on;
        proxy_ssl_verify      off;
    }

    location / {
        return 404;
    }
}
