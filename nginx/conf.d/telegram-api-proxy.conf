# Проксирует запросы к вашему домену → api.telegram.org
# Используй как: https://tg-api.yourdomain.com/bot<TOKEN>/sendMessage
# вместо:        https://api.telegram.org/bot<TOKEN>/sendMessage

server {
    listen 80;
    server_name ${TG_API_DOMAIN};

    # ACME challenge для Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ${TG_API_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${TG_API_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${TG_API_DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        include             /etc/nginx/snippets/proxy-common.conf;
        proxy_pass          https://api.telegram.org;
        proxy_set_header    Host api.telegram.org;
    }
}
