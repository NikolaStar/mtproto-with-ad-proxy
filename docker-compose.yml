services:
  mtproxy:
    build: ./mtproxy
    container_name: mtproxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-443}:443"
    volumes:
      - proxy-config:/config
    environment:
      - TLS_DOMAIN=${TLS_DOMAIN:-www.google.com}
      - AD_TAG=${AD_TAG:-}
    networks:
      - proxy-net

  access-bot:
    build: ./access-bot
    container_name: access-bot
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - proxy-config:/proxy-config
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - PROXY_HOST=${PROXY_HOST}
      - PROXY_PORT=${PROXY_PORT:-443}
      - TLS_DOMAIN=${TLS_DOMAIN:-www.google.com}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_redis_pass}@redis:6379/0
      - API_KEY=${API_KEY}
      - API_PORT=${API_PORT:-8080}
    networks:
      - proxy-net

  redis:
    image: redis:7-alpine
    container_name: proxy-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_pass} --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - proxy-net

volumes:
  proxy-config:
  redis-data:

networks:
  proxy-net:
    driver: bridge